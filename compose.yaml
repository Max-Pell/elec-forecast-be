services:
  db:
    image: timescale/timescaledb:2.18.0-pg17
    container_name: elec-forecast-db
    environment:
      POSTGRES_USER: elec
      POSTGRES_DB: elec
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg-isready -U elec -d elec"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: